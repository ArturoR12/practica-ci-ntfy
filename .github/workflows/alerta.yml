name: Notificacion de CI a ntfy

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Ejecutar Hola Mundo
        run: node index.js

      - name: Enviar Alerta a ntfy.sh
        if: success()
        run: |
          curl -H "Priority: urgent" \
               -d "El repositorio ha sido actualizado en la rama main. El hola ha sido enviado exitosamente." \
               https://ntfy.sh/devops-itla